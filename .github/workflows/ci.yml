name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.11.1"
          modules: qt5compat
          # aqtinstall 3.3.* can't locate Qt 6.11+ on Windows - the online
          # repo dropped the combined qt6_XXXX/qt6_XXXX/Updates.xml in favor
          # of per-arch dirs (miurahr/aqtinstall#959). Use the patched
          # aqtinstall until a release containing PR #1000 lands on PyPI.
          aqtsource: ${{ runner.os == 'Windows' && 'git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b' || '' }}

      - name: Set Qt env vars
        shell: bash
        run: |
          echo "CMAKE_PREFIX_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Qt6Core5Compat isn't bundled with the PySide6 wheel (see
            # docs/BINDINGS.md issue 3), so scintilla_qt's dependency on it
            # must resolve to the aqtinstall'd Qt at runtime.
            echo "LD_LIBRARY_PATH=$QT_ROOT_DIR/lib" >> "$GITHUB_ENV"
          fi

      - name: Install build/runtime dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          # clang/libclang-dev: shiboken6-generator's bundled libclang can't
          # locate its builtin headers (stddef.h etc.) without an external
          # CLANG_INSTALL_DIR - MSVC's headers don't need this.
          # libgl1/libegl1/libxkbcommon0: needed for Qt6Gui to load under
          # QT_QPA_PLATFORM=offscreen for the test suite.
          sudo apt-get install -y clang libclang-dev libgl1 libegl1 libxkbcommon0
          RESOURCE_DIR=$(clang -print-resource-dir)
          echo "Clang resource dir: $RESOURCE_DIR"
          echo "CLANG_INSTALL_DIR=$(dirname "$(dirname "$(dirname "$RESOURCE_DIR")")")" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: uv sync
        run: uv sync

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
