site_name: pyside6-scintilla
site_description: Permissively-licensed PySide6 bindings for the Scintilla code editor component
site_url: https://borco.github.io/pyside6-scintilla/
repo_url: https://github.com/borco/pyside6-scintilla
repo_name: borco/pyside6-scintilla
edit_uri: edit/master/docs/

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            # The .pyi stub has no docstrings on individual members (see
            # tools/generate_pyi.py) - show them anyway, since the signature
            # itself is the documentation for most of this binding's API.
            show_if_no_docstring: true
            # Source shown would be the generated .pyi stub (`def foo(...) -> T: ...`),
            # not the real implementation - not useful to readers.
            show_source: false

theme:
  name: material
  favicon: assets/images/favicon.svg
  icon:
    logo: material/code-braces
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

